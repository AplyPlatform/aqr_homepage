<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간편 QR계좌이체(AQR) 서비스 수신 계좌 변경 진행 : 케이뱅크</title>
  <link href="./assets/globals.css" rel="stylesheet">
  <link href="./style.css" rel="stylesheet">
</head>
<body>
<div class="site-bg">

  <!-- ── 상단 헤더 배너 ── -->
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <div class="header-badge">간편 QR계좌이체용 · STEP 1 / 2</div>
        <h1 class="header-title">간편 QR계좌이체 서비스(AQR)의 QR코드 정보를 수정하시겠습니까?</h1>
        <p class="header-sub">QR 코드 정보 갱신을 위해 "다음 단계로" 버튼을 터치해주세요.</p>
      </div>
      <!-- 데스크탑 장식 아이콘 (모바일에서는 CSS로 숨김) -->
      <div class="header-deco" aria-hidden="true" style="display:none;">🏦</div>
    </div>
  </div>

  <!-- ── 본문 ── -->
  <div class="page-body">

    <!-- 진행 단계 표시 -->
    <div class="step-indicator">
      <div class="step-item">
        <div class="step-circle active">1</div>
        <span class="step-label active">계좌 정보 확인</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-circle inactive">2</div>
        <span class="step-label">방침 동의 및 제출</span>
      </div>
    </div>

    <!-- 입력 카드 -->
    <div class="card">
      <div class="section-tag">
        <span class="section-tag-bar"></span>
        <span class="section-tag-text">계좌 정보 확인</span>
      </div>

      <div class="form-grid">

        <!-- 사업자 번호 -->
        <div class="field-group">
          <label class="field-label" for="bizNo">
            사업자 번호
          </label>
          <input
            value="123-12-12344"
            class="field-input"
            type="text"
            id="bizNo"
            name="bizNo"
            placeholder="예) 123-45-67890"
            maxlength="12"
            inputmode="numeric"
            autocomplete="off"
            disabled
          >          
          <p class="field-error" id="bizNoError">사업자 번호를 입력해주세요.</p>
        </div>

        <!-- 예금주명 -->
        <div class="field-group">
          <label class="field-label" for="accountName">
            예금주명
          </label>
          <input
            value="동행복"
            class="field-input"
            type="text"
            id="accountName"
            name="accountName"
            placeholder="예) 홍길동"
            maxlength="30"
            autocomplete="name"
            disabled
          >
          <p class="field-error" id="accountNameError">예금주명을 입력해주세요.</p>
        </div>

        <!-- 계좌번호 (전체 너비) -->
        <div class="field-group span-full">
          <label class="field-label" for="accountNo">
            계좌번호
          </label>
          <input
            value="100-123-456789"
            class="field-input"
            type="text"
            id="accountNo"
            name="accountNo"
            placeholder="예) 100-123-456789"
            maxlength="25"
            inputmode="numeric"
            autocomplete="off"
            disabled
          >          
          <p class="field-error" id="accountNoError">계좌번호를 입력해주세요.</p>
        </div>

      </div><!-- /form-grid -->
    </div><!-- /card -->

    <!-- 안내 박스 -->
    <div class="info-box">
      <p>&#8226; 상기 정보는 클립보드에 임시 저장되어 다음 단계로 전달됩니다.</p>
      <p>&#8226; 다음 단계에서 개인정보처리 방침 동의 후 최종 사용됩니다.</p>
    </div>

    <!-- 제출 버튼 -->
    <div class="btn-wrap">
      <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">
        다음 단계로 &rarr;
      </button>
    </div>

  </div><!-- /page-body -->

</div><!-- /site-bg -->

<!-- 토스트 -->
<div class="toast" id="toast">&#10003;&nbsp; 클립보드에 복사되었습니다. 다음 페이지로 이동합니다.</div>

<script>
  // 데스크탑 장식 아이콘 표시
  (function () {
    var deco = document.querySelector('.header-deco');
    if (deco && window.innerWidth >= 1024) {
      deco.style.display = 'flex';
    }
    window.addEventListener('resize', function () {
      if (deco) deco.style.display = window.innerWidth >= 1024 ? 'flex' : 'none';
    });
  })();

  // 사업자 번호 자동 하이픈
  document.getElementById('bizNo').addEventListener('input', function () {
    var val = this.value.replace(/[^0-9]/g, '');
    if (val.length > 5) {
      val = val.slice(0, 3) + '-' + val.slice(3, 5) + '-' + val.slice(5, 10);
    } else if (val.length > 3) {
      val = val.slice(0, 3) + '-' + val.slice(3);
    }
    this.value = val;
  });

  function showError(id, show) {
    var el = document.getElementById(id);
    if (el) el.style.display = show ? 'block' : 'none';
  }

  function handleSubmit() {
    var bizNo       = document.getElementById('bizNo').value.trim();
    var accountNo   = document.getElementById('accountNo').value.trim();
    var accountName = document.getElementById('accountName').value.trim();

    var valid = true;
    showError('bizNoError',      !bizNo);       if (!bizNo)       valid = false;
    showError('accountNoError',  !accountNo);   if (!accountNo)   valid = false;
    showError('accountNameError', !accountName); if (!accountName) valid = false;
    if (!valid) return;

    var clipText = [bizNo, accountNo, accountName].join(',');

    function goNext() {
      var toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function () { window.location.href = 'aqr.html'; }, 1800);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(clipText).then(goNext).catch(function () {
        fallbackCopy(clipText); goNext();
      });
    } else {
      fallbackCopy(clipText); goNext();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
</script>
</body>
</html>
