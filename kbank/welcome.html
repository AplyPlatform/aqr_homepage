<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>케이뱅크 사장님 통장 개설 및 QR 간편이체 서비스 안내</title>
  <link href="./assets/globals.css" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #e2ddff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Gmarket Sans TTF-Medium", "Pretendard-SemiBold", Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 595px;
      max-width: 100%;
      padding: 60px 40px;
      text-align: center;
      opacity: 0;
      transform: translateY(-40px);
      animation: fadeSlideIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      background-color: #4d2cff;
      border-radius: 50%;
    }

    .logo-line {
      width: 60px;
      height: 3px;
      background-color: #4d2cff;
      border-radius: 2px;
    }

    .welcome-title {
      font-family: "Gmarket Sans TTF-Bold", Helvetica, sans-serif;
      font-size: 70px;
      font-weight: 700;
      color: #4d2cff;
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 4px;
      background-color: #4d2cff;
      border-radius: 2px;
      margin: 0 auto 36px;
    }

    .description {
      font-family: "Gmarket Sans TTF-Medium", Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 400;
      color: #222222;
      line-height: 1.8;
      letter-spacing: -0.3px;
      margin-bottom: 56px;
      word-break: keep-all;
    }

    .description strong {
      color: #4d2cff;
      font-family: "Gmarket Sans TTF-Bold", Helvetica, sans-serif;
      font-weight: 700;
    }

    .btn-continue {
      display: inline-block;
      padding: 16px 48px;
      background-color: #4d2cff;
      color: #ffffff;
      font-family: "Gmarket Sans TTF-Bold", Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(77, 44, 255, 0.3);
    }

    .btn-continue:hover {
      background-color: #3a1fcc;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(77, 44, 255, 0.45);
    }

    .btn-continue:active {
      transform: translateY(0);
      box-shadow: 0 4px 14px rgba(77, 44, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-bar">
      <div class="logo-dot"></div>
      <div class="logo-line"></div>
      <div class="logo-dot"></div>
    </div>

    <h1 class="welcome-title">환영합니다!</h1>

    <div class="divider"></div>

    <p class="description">
      <strong>케이뱅크 사장님 통장 개설</strong> 및<br>
      <strong>QR 간편이체 서비스</strong> 정보의 갱신을 진행합니다.
    </p>

    <a href="./kbank.html" class="btn-continue">계속하기</a>
  </div>
</body>
</html>
